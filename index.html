<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>RC Speedo</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
}

.speed {
  font-size: 80px;
  color: #00e5ff;
  text-shadow: 0 0 20px #00e5ff;
}

.card {
  background: #111;
  padding: 12px;
  margin: 6px;
  display: inline-block;
  border-radius: 10px;
  min-width: 100px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #00c853;
  color: white;
}
</style>

</head>

<body>

<button id="btn">CONNECT</button>

<div class="speed" id="speed">0</div>

<div>
  <div class="card">Max<br><span id="max">0</span></div>
  <div class="card">Sats<br><span id="sats">0</span></div>
</div>

<button onclick="resetMax()">RESET</button>

<script>
let dataChar, controlChar;
let targetSpeed = 0;
let displaySpeed = 0;

document.getElementById("btn").addEventListener("click", async () => {

  const device = await navigator.bluetooth.requestDevice({
    filters: [{ name: "RC-Speedo" }],
    optionalServices: [0x180C]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(0x180C);

  dataChar = await service.getCharacteristic(0x2A56);
  controlChar = await service.getCharacteristic(0x2A57);

  await dataChar.startNotifications();

  dataChar.addEventListener("characteristicvaluechanged", (event) => {

    let value = new TextDecoder().decode(event.target.value);
    let parts = value.trim().split(",");

    if (parts.length < 3) return;

    let speed = parseFloat(parts[0]) || 0;
    let max = parseFloat(parts[1]) || 0;
    let sats = parseInt(parts[2]) || 0;

    targetSpeed = speed;

    document.getElementById("max").innerText = max.toFixed(1);
    document.getElementById("sats").innerText = sats;
  });
});

async function resetMax() {
  if (!controlChar) return;

  await controlChar.writeValueWithoutResponse(
    new TextEncoder().encode("RESET")
  );
}

// SMOOTH (fix lag)
function animate() {

  if (targetSpeed < displaySpeed) {
    displaySpeed -= 0.3;
  } else {
    displaySpeed += (targetSpeed - displaySpeed) * 0.08;
  }

  document.getElementById("speed").innerText =
    displaySpeed.toFixed(1);

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
