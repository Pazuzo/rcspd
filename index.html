<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>RC Speedo</title>

<style>
body {
  background: #000;
  color: white;
  text-align: center;
  font-family: Arial;
}

.speed {
  font-size: 80px;
  color: #00e5ff;
}

.card {
  background: #111;
  padding: 10px;
  margin: 5px;
  display: inline-block;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  margin: 10px;
}
</style>

</head>

<body>

<button id="btn">CONNECT</button>

<div class="speed" id="speed">0</div>

<div class="card">Max: <span id="max">0</span></div>
<div class="card">Sats: <span id="sats">0</span></div>

<button onclick="resetMax()">RESET</button>

<script>
let dataChar, controlChar;
let targetSpeed = 0;
let displaySpeed = 0;

document.getElementById("btn").addEventListener("click", async () => {

  const device = await navigator.bluetooth.requestDevice({
    filters: [{ name: "RC-Speedo" }],
    optionalServices: [0x180C]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(0x180C);

  dataChar = await service.getCharacteristic(0x2A56);
  controlChar = await service.getCharacteristic(0x2A57);

  await dataChar.startNotifications();

  dataChar.addEventListener("characteristicvaluechanged", (e) => {
    let value = new TextDecoder().decode(e.target.value);

    let parts = value.split(",");

    let speed = parseFloat(parts[0]) || 0;
    let max = parseFloat(parts[1]) || 0;
    let sats = parseInt(parts[2]) || 0;

    targetSpeed = speed;

    document.getElementById("max").innerText = max.toFixed(1);
    document.getElementById("sats").innerText = sats;
  });
});

async function resetMax() {
  if (!controlChar) return;

  await controlChar.writeValue(new TextEncoder().encode("RESET"));
}

// smooth speed
function animate() {
  displaySpeed += (targetSpeed - displaySpeed) * 0.2;
  document.getElementById("speed").innerText = displaySpeed.toFixed(1);
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
