<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>RC Speedo</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  margin-top: 40px;
}

.speed {
  font-size: 80px;
  font-weight: bold;
  color: #00e5ff;
  text-shadow: 0 0 20px #00e5ff;
}

.unit {
  font-size: 24px;
  color: #888;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  display: inline-block;
  min-width: 120px;
}

button {
  font-size: 18px;
  padding: 10px 20px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  background: #00c853;
  color: white;
}
</style>

</head>

<body>

<div class="container">

<button id="btn">CONNECT</button>

<div class="speed" id="speed">0</div>
<div class="unit">km/h</div>

<div>
  <div class="card">
    Max<br><span id="max">0</span>
  </div>

  <div class="card">
    Satellites<br><span id="sats">0</span>
  </div>
</div>

<button onclick="resetMax()">RESET</button>

</div>

<script>
let characteristic;
let controlCharacteristic;
let targetSpeed = 0;
let displaySpeed = 0;

document.getElementById("btn").addEventListener("click", async () => {
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ name: "RC-Speedo" }],
    optionalServices: [0x180C]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(0x180C);

  characteristic = await service.getCharacteristic(0x2A56);
  controlCharacteristic = await service.getCharacteristic(0x2A57);

  await characteristic.startNotifications();

  characteristic.addEventListener("characteristicvaluechanged", (event) => {
    const value = new TextDecoder().decode(event.target.value);

    let parts = value.split(",");
    let speed = parseFloat(parts[0]) || 0;
    let max = parseFloat(parts[1]) || 0;
    let sats = parseInt(parts[2]) || 0;

    targetSpeed = speed;

    document.getElementById("max").innerText = max.toFixed(1);
    document.getElementById("sats").innerText = sats;
  });
});

async function resetMax() {
  if (!controlCharacteristic) return;

  const encoder = new TextEncoder();
  await controlCharacteristic.writeValue(encoder.encode("RESET"));
}

function animate() {
  displaySpeed += (targetSpeed - displaySpeed) * 0.15;

  document.getElementById("speed").innerText =
    displaySpeed.toFixed(1);

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
